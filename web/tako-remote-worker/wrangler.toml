name = "tako-remote-relay"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace は wrangler で作成後にバインディング ID を設定する:
#   wrangler kv namespace create RELAY_KV
#   wrangler kv namespace create RELAY_KV --preview
# 生成された ID を以下に記入する。.dev.vars は .gitignore 済み
[[kv_namespaces]]
binding = "RELAY_KV"
id = ""
preview_id = ""
