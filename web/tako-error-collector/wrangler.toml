name = "tako-error-collector"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace は wrangler で作成後にバインディング ID を設定する:
#   wrangler kv namespace create REPORTS_KV
#   wrangler kv namespace create REPORTS_KV --preview
# 生成された ID を以下に記入する
[[kv_namespaces]]
binding = "REPORTS_KV"
id = "24e82234923142e0ba9185db2e15bd24"
preview_id = "59eb34c07f38402a9348d87f6b907aa3"

# 読み取りエンドポイントの認証トークンは Worker の secret に設定する:
#   wrangler secret put ADMIN_TOKEN
# リポジトリにはコミットしない
