<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 案D: ターミナルのブロックカーソルそのものがタコ（プロンプト > の隣に棲む） -->
  <defs>
    <linearGradient id="d-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101720"/>
      <stop offset="1" stop-color="#0a0f0d"/>
    </linearGradient>
    <linearGradient id="d-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="d-glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="234" fill="url(#d-bg)"/>
  <rect width="1024" height="1024" rx="234" fill="url(#d-glow)"/>
  <!-- プロンプト > -->
  <path d="M196,420 L286,478 L196,536" fill="none" stroke="#cbd5e1"
        stroke-width="46" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- 触手（カーソル下端から） -->
  <g fill="none" stroke="#22c55e" stroke-width="48" stroke-linecap="round">
    <path d="M428,600 C418,710 368,762 322,784"/>
    <path d="M478,612 C478,724 456,776 434,818"/>
    <path d="M540,616 C540,730 540,786 540,836"/>
    <path d="M602,612 C602,724 624,776 646,818"/>
    <path d="M652,600 C662,710 712,762 758,784"/>
  </g>
  <!-- 本体 = ブロックカーソル -->
  <rect x="400" y="222" width="280" height="404" rx="58" fill="url(#d-body)"/>
  <!-- 目と口 -->
  <circle cx="480" cy="376" r="30" fill="#0b3a22"/>
  <circle cx="600" cy="376" r="30" fill="#0b3a22"/>
  <circle cx="489" cy="367" r="9" fill="#d1fae5"/>
  <circle cx="609" cy="367" r="9" fill="#d1fae5"/>
  <path d="M506,466 q34,28 68,0" fill="none" stroke="#0b3a22"
        stroke-width="15" stroke-linecap="round"/>
</svg>
